# =============================================================================
# Global Configuration for Cell Classification Pre-processing Pipeline
# =============================================================================
# This config is designed for a 4-member team collaboration
# Each member has specific responsibilities outlined below
# =============================================================================

project:
  name: "Cell_Classification_Pipeline"
  version: "1.0.0"
  description: "Pre-processing pipeline for blood cell anomaly classification"
  
# =============================================================================
# TEAM ASSIGNMENTS
# =============================================================================
# Team Structure: 4 members total (1 Leader + 3 Pre-processing Members)
# =============================================================================
team:
  leader:
    role: "Team Leader & Model Training Lead"
    responsibilities:
      - "Coordinate team workflow"
      - "Train classification models"
      - "Evaluate model performance"
      - "Final model selection and tuning"
    tasks_file: "model_training.md"
    excluded_from:
      - "preprocessing"
    
  member_1:
    role: "Numeric Processing Lead"
    responsibilities:
      - "Process 4 numeric feature groups (A, B, C, D)"
      - "Handle outliers (Capping/Trimming)"
      - "Apply transformations and scaling"
      - "Physical units normalization"
    tasks_file: "numeric-processing.md"
    input: "raw data"
    output: "numeric_processed.csv"
    
  member_2:
    role: "Categorical & Feature Engineering Lead"
    responsibilities:
      - "Encode categorical variables"
      - "Handle high cardinality features"
      - "Create domain-based features (N/C Ratio, Form Factor, etc.)"
      - "Handle multi-modality with clustering"
      - "Data augmentation"
    tasks_file: "categorical-processing.md"
    input: "numeric_processed.csv"
    output: "feature_engineered.csv"
    
  member_3:
    role: "Feature Selection & Validation Lead"
    responsibilities:
      - "Remove redundant features (VIF, Correlation)"
      - "Apply Mutual Information & RFE"
      - "Handle class imbalance"
      - "Final validation with cross-validation"
      - "Prepare model-ready dataset"
    tasks_file: "numeric/detail_3.md"
    input: "feature_engineered.csv"
    output: "model_input.csv"

# =============================================================================
# DATA CONFIGURATION
# =============================================================================
data:
  input:
    path: "data/raw/cell_data.csv"
    target_column: "anomaly_label"
    
  output:
    path: "data/processed/"
    train_test_split:
      method: "stratified_train_test_split"
      test_size: 0.2
      random_state: 42
      stratify: true

# =============================================================================
# NUMERIC FEATURE GROUPS (Member 1)
# =============================================================================
numeric_groups:
  group_a:
    name: "Nhóm A: Hình thái & Bệnh lý (Tín hiệu Vàng)"
    description: "High separability, skewed distribution with outliers"
    features:
      - "eccentricity"
      - "lobularity_score"
      - "chromatin_density"
      # nucleus_area_pct REMOVED after feature engineering: replaced by nc_ratio
      # (nc_ratio = nucleus_area_pct / (100 - nucleus_area_pct) is a monotonic bijection
      #  → perfect multicollinearity VIF=∞ if both are kept)
      - "circularity"
    
    processing:
      outlier_strategy: "capping"
      capping_method: "winsorization"
      capping_percentiles: [1, 99]
      
      transformation: "power_transformer"
      transformer_method: "yeo_johnson"
      
      scaling: "robust_scaler"
      reason: "Protect outlier characteristics"
    
    priority: "critical"
    
  group_b:
    name: "Nhóm B: Hình thái học (Cần xử lý Skewness)"
    description: "Average separability, multi-modal distribution"
    features:
      - "cell_diameter_um"
      # cell_area_px REMOVED after feature engineering: replaced by true_cell_area
      # perimeter_px  REMOVED after feature engineering: replaced by true_perimeter
      - "cytoplasm_ratio"
      - "membrane_smoothness"
      - "granularity_score"
    
    processing:
      outlier_strategy: "capping"
      
      transformation: "quantile_transformer"
      output_distribution: "uniform"
      # Alternative: keep original multi-modal
      
      scaling: "standard_scaler"
    
    priority: "high"
    
  group_c:
    name: "Nhóm C: Chỉ số Huyết học & Nhiễu kỹ thuật"
    description: "Poor separability, symmetric distribution"
    features:
      - "wbc_count_per_ul"
      - "rbc_count_millions_per_ul"
      - "hemoglobin_g_dl"
      - "hematocrit_pct"
      - "platelet_count_per_ul"
      - "mcv_fl"
      - "mchc_g_dl"
      # mean_r / mean_g / mean_b REMOVED after feature engineering:
      # replaced by r_ratio, g_ratio (chromaticity ratios computed from
      # protocol-shifted values). stain_intensity retained for absolute brightness.
      - "stain_intensity"
    
    processing:
      outlier_strategy: "trimming"
      trimming_method: "iqr"
      iqr_multiplier: 1.5
      reason: "Remove measurement errors and device noise"
      
      transformation: "none"
      
      scaling: "min_max_scaler"
    
    priority: "low"
    recommendation: "Consider feature selection to remove low-importance features"
    
  group_d:
    name: "Nhóm D: Điểm tin cậy & Thuật toán"
    description: "Special handling required"
    features:
      - "labeller_confidence_score"
      - "cytodiffusion_classification_confidence"
      - "cytodiffusion_anomaly_score"
    
    processing:
      cytodiffusion_anomaly_score:
        action: "drop"
        reason: "Data leakage - prevents model from 'memorizing' results"
        
      labeller_confidence_score:
        action: "filter_rows_then_drop"
        threshold: 0.5
        reason: "Remove low-confidence labeled samples, then drop column (meta-feature, not cell property)"
        
      cytodiffusion_classification_confidence:
        action: "drop"
        reason: "Data leakage - confidence from the same cytodiffusion system that produced anomaly_score"

# =============================================================================
# CATEGORICAL FEATURE PROCESSING (Member 2)
# =============================================================================
categorical_features:
  cell_id:
    processing: "drop"
    reason: "Identifier column - no predictive value"
    action: "drop"

  disease_category:
    processing: "drop"
    reason: "Data leakage - contains target information"
    p_value: 0.0
    action: "drop"
    
  staining_protocol:
    processing: "one_hot_encoding"
    # Only 3 values: Giemsa, Wright, etc.
    p_value: 0.026
    action: "keep"
    
  patient_age_group:
    processing: "ordinal_encoding"
    # Order: Pediatric < Adult < Elderly
    mapping:
      Pediatric: 1
      Adult: 2
      Elderly: 3
    p_value: 0.589
    action: "keep_as_control"
    
  patient_sex:
    processing: "one_hot_encoding"
    # Only 2 values: M/F
    p_value: 0.376
    action: "keep_as_control"
    
  dataset_source:
    processing: "drop"
    reason: "No statistical significance - reduce noise"
    p_value: 0.520
    action: "drop"
    
  microscope_model:
    processing: "drop"
    reason: "No statistical significance - reduce noise"
    p_value: 0.408
    action: "drop"

# =============================================================================
# FEATURE ENGINEERING (Member 2)
# =============================================================================
feature_engineering:
  # 1. N/C Ratio (Nucleus-to-Cytoplasm Ratio)
  nc_ratio:
    formula: "nucleus_area_pct / (100 - nucleus_area_pct)"
    target_group: "group_a"
    description: "Gold standard for malignant cell detection"
    
  # 2. Physical Units Normalization
  physical_units:
    - feature: "true_cell_area"
      formula: "cell_area_px / (magnification_x ^ 2)"
    - feature: "true_perimeter"
      formula: "perimeter_px / magnification_x"
    - description: "Normalize across different microscope magnifications"
    
  # 3. Shape Complexity (Form Factor)
  form_factor:
    formula: "(4 * pi * cell_area_px) / (perimeter_px ^ 2)"
    interpretation: "1.0 = perfect circle, lower = more complex shape"
    target_group: "group_a + group_b"
    
  # 4. Chromaticity Features
  # NOTE: computed AFTER protocol shifting (Step 5) so that ratios reflect
  # bias-free hue rather than staining-protocol artifacts.
  chromaticity:
    prerequisite: "protocol_shifting must run first (Step 5 before Step 6)"
    - feature: "r_ratio"
      formula: "mean_r_shifted / (mean_r_shifted + mean_g_shifted + mean_b_shifted)"
    - feature: "g_ratio"
      formula: "mean_g_shifted / (mean_r_shifted + mean_g_shifted + mean_b_shifted)"
    # b_ratio NOT kept: r_ratio + g_ratio + b_ratio ≡ 1 → perfect linear dependency → VIF=∞
    - description: "Protocol-normalised color ratios, lighting-invariant"
    - source_features: ["mean_r", "mean_g", "mean_b"]  # dropped after engineering
    - target_group: "engineered"
    
  # 5. Global-Local Interaction
  size_anomaly:
    formula: "cell_diameter_um / mcv_fl"
    description: "Compare cell size to patient's average red blood cell volume"
    source_features: ["cell_diameter_um", "mcv_fl"]
    target_group: "group_b + group_c"

# =============================================================================
# CLUSTERING FOR MULTI-MODALITY (Member 2)
# =============================================================================
clustering:
  algorithm: "GMM"  # Gaussian Mixture Models (recommended)
  # Alternative: K-Means
  
  features_for_clustering:
    - "cell_diameter_um"
    - "nucleus_area_pct"
    - "chromatin_density"
    - "cell_area_px"
    - "cytoplasm_ratio"
    - "granularity_score"
  
  optimal_clusters:
    method: "elbow_method"  # Or silhouette_score
    expected_range: [3, 5]  # Typical for blood cell types
  
  output:
    - "cell_subpopulation"  # Cluster ID as new feature
  
  usage:
    - "Feature Augmentation: One-Hot encode cluster IDs"
    - "Cluster-specific Scaling: Scale within each cluster"

# =============================================================================
# DATA AUGMENTATION (Member 2)
# =============================================================================
data_augmentation:
  # 1. Gaussian Noise Injection
  # NOTE: target_features updated — cell_area_px / perimeter_px / mean_r/g/b are
  # dropped after feature engineering and no longer exist at this pipeline stage.
  gaussian_noise:
    target_groups: ["group_b", "engineered_physical"]
    target_features:
      - "cell_diameter_um"
      - "cytoplasm_ratio"
      - "membrane_smoothness"
      - "granularity_score"
      - "true_cell_area"      # physical unit version of cell_area_px
      - "true_perimeter"      # physical unit version of perimeter_px
      - "stain_intensity"     # remaining Group C color feature
    sigma_percentage: 0.01
    description: "Simulate measurement errors (targets updated after source-feature drops)"

  # 2. Staining Protocol Shifting
  # IMPORTANT: runs as Step 5, BEFORE Feature Engineering (Step 6).
  # Reason: chromaticity ratios must be computed from bias-free colors.
  protocol_shifting:
    pipeline_step: 5
    runs_before: "feature_engineering (Step 6)"
    target_features: ["mean_r", "mean_g", "mean_b", "stain_intensity"]
    method: "group_wise_normalization"
    description: "Normalize color across different staining protocols before chromaticity ratios are computed"
    
  # 3. SMOTE for Imbalance
  smote:
    method: "SMOTE-Tomek Links"
    description: "Oversample minority + remove boundary noise"
    
  # 4. Covariate Shift Simulation
  covariate_shift:
    target_groups: ["group_c"]
    target_features: ["wbc_count_per_ul", "rbc_count_millions_per_ul", "hemoglobin_g_dl", "hematocrit_pct", "platelet_count_per_ul", "mcv_fl", "mchc_g_dl"]
    factor_range: [0.98, 1.02]
    description: "Simulate variation between different hospitals"

# =============================================================================
# FEATURE SELECTION (Member 3)
# =============================================================================
feature_selection:
  # 1. Multicollinearity Check
  multicollinearity:
    method: "VIF"  # Variance Inflation Factor
    threshold: 10
    action: "remove_high_vif"
    
  # 2. Correlation Matrix
  correlation_filter:
    method: "correlation_matrix"
    threshold: 0.9
    action: "remove_one_of_pair"
    
  # 3. Mutual Information
  mutual_info:
    method: "mutual_info_classif"
    target: "anomaly_label"
    action: "select_k_best"
    k_range: [15, 20]
    
  # 4. Recursive Feature Elimination
  rfe:
    estimator: "RandomForest"  # Or XGBoost
    step: 1
    cv_folds: 5
    action: "find_optimal_features"
    expected_optimal: [10, 12]
    
  # 5. Permutation Importance
  permutation_importance:
    method: "shap"
    description: "Explain model decisions post-training"

# =============================================================================
# CLASS IMBALANCE HANDLING (Member 3)
# =============================================================================
imbalance_handling:
  current_skewness: 0.77
  
  strategies:
    - method: "stratified_split"
      description: "Maintain class ratio in train/test split"
      
    - method: "SMOTE-Tomek"
      description: "Combine oversampling + undersampling"
      
    - method: "cost_sensitive_learning"
      description: "Penalize minority class misclassification more"

# =============================================================================
# VALIDATION WORKFLOW
# =============================================================================
validation:
  cross_validation:
    method: "train_test_split"
    stratified: true
    test_size: 0.2
    random_state: 42
    
  metrics:
    - "accuracy"
    - "f1_score"
    - "precision"
    - "recall"
    - "roc_auc"
    
  post_training:
    - "SHAP Summary Plot"
    - "Permutation Importance"
    - "Confusion Matrix Analysis"

# =============================================================================
# PIPELINE EXECUTION ORDER
# =============================================================================
# Pre-processing: Members 1-3 → Leader: Training & Evaluation
# =============================================================================
pipeline_order:
  # -------------------------------------------------------------------------
  # MEMBER 1: Numeric Processing
  # -------------------------------------------------------------------------
  step_1:
    member: 1
    task: "Load raw data and validate"
    description: "Read CSV, check data types, identify missing values"
    output: "data/raw/validated.csv"
    
  step_2:
    member: 1
    task: "Process Group A (Pathology signals) - outliers, capping, Yeo-Johnson, RobustScaler"
    description: "Handle skewed distribution with outliers, keep as pathological samples"
    input_features: ["eccentricity", "lobularity_score", "chromatin_density", "nucleus_area_pct", "circularity"]
    output: "data/intermediate/group_a_processed.csv"
    
  step_3:
    member: 1
    task: "Process Group B (Multi-modal) - capping, QuantileTransformer, StandardScaler"
    description: "Handle multi-modal distribution, apply QuantileTransformer for uniform distribution"
    input_features: ["cell_diameter_um", "cell_area_px", "perimeter_px", "cytoplasm_ratio", "membrane_smoothness", "granularity_score"]
    output: "data/intermediate/group_b_processed.csv"
    
  step_4:
    member: 1
    task: "Process Group C (Hematology/Noise) - trimming, Min-Max Scaler"
    description: "Remove outliers (measurement errors), reduce noise features"
    input_features: ["wbc_count_per_ul", "rbc_count_millions_per_ul", "hemoglobin_g_dl", "hematocrit_pct", "platelet_count_per_ul", "mcv_fl", "mchc_g_dl", "mean_r", "mean_g", "mean_b", "stain_intensity"]
    output: "data/intermediate/group_c_processed.csv"
    
  step_5:
    member: 1
    task: "Process Group D (Confidence scores) - drop leakage columns, filter by confidence"
    description: "Drop cytodiffusion_anomaly_score and cytodiffusion_classification_confidence (data leakage). Filter rows where labeller_confidence_score < 0.5, then drop the column."
    input_features: ["labeller_confidence_score", "cytodiffusion_classification_confidence", "cytodiffusion_anomaly_score"]
    output: "data/intermediate/group_d_processed.csv"
    
  step_6:
    member: 1
    task: "Physical units normalization"
    description: "Convert pixel-based features to real units based on magnification"
    output: "data/intermediate/numeric_processed.csv"
    
  # -------------------------------------------------------------------------
  # MEMBER 2: Categorical & Feature Engineering
  # -------------------------------------------------------------------------
  step_5_protocol_shift:
    member: 2
    task: "Staining Protocol Shifting (BEFORE Feature Engineering)"
    description: |
      Normalize mean_r, mean_g, mean_b, stain_intensity across staining protocols via
      group-wise mean shift. Must run before Step 6 so that chromaticity ratios are
      computed from bias-free (protocol-normalised) color values.
    input: "data/intermediate/numeric_processed.csv"
    output: "data/intermediate/protocol_shifted.csv"

  step_6_feature_eng:
    member: 2
    task: "Create domain-based features (from shifted colors)"
    description: |
      N/C Ratio, Form Factor, Chromaticity (r_ratio, g_ratio only — b_ratio dropped),
      Size Anomaly, physical unit features. Chromaticity is computed from
      protocol-shifted colors produced in Step 5.
    output: "data/intermediate/feature_engineered.csv"

  step_7_drop_sources:
    member: 2
    task: "Drop source features after engineering (multicollinearity prevention)"
    description: |
      Drop features that are now fully encoded by engineered ones:
        nucleus_area_pct → nc_ratio      (monotonic bijection, VIF=∞)
        cell_area_px     → true_cell_area + form_factor
        perimeter_px     → true_perimeter + form_factor
        mean_r/g/b       → r_ratio, g_ratio (chromaticity post-shift)
        b_ratio          → 1 - r_ratio - g_ratio (perfect linear dependency)
    output: "data/intermediate/sources_dropped.csv"

  step_8_categorical:
    member: 2
    task: "Encode categorical variables"
    description: "One-Hot encoding (staining_protocol, patient_sex), Ordinal encoding (patient_age_group)"
    input: "data/intermediate/sources_dropped.csv"
    output: "data/intermediate/categorical_encoded.csv"
    
  step_9:
    member: 2
    task: "Apply clustering (GMM) for multi-modality"
    description: "Create cell subpopulation labels, add as features"
    output: "data/intermediate/clustering_added.csv"
    
  step_10:
    member: 2
    task: "Apply data augmentation"
    description: "Gaussian noise, Protocol shifting, SMOTE-Tomek"
    output: "data/intermediate/augmented.csv"
    
  # -------------------------------------------------------------------------
  # MEMBER 3: Feature Selection & Validation
  # -------------------------------------------------------------------------
  step_11:
    member: 3
    task: "Remove redundant features (VIF, Correlation > 0.9)"
    description: "Check multicollinearity, remove highly correlated pairs"
    input: "data/intermediate/augmented.csv"
    output: "data/intermediate/feature_reduced.csv"
    
  step_12:
    member: 3
    task: "Apply feature selection (Mutual Information, RFE)"
    description: "Select top features based on information gain"
    output: "data/intermediate/feature_selected.csv"
    
  step_13:
    member: 3
    task: "Handle class imbalance"
    description: "Apply SMOTE-Tomek, stratified train/test split"
    output: "data/intermediate/imbalance_handled.csv"
    
  step_14:
    member: 3
    task: "Final validation and save processed data"
    description: "Cross-validation check, save model-ready dataset"
    output: "data/processed/model_input.csv"
    
  # -------------------------------------------------------------------------
  # LEADER: Model Training & Evaluation
  # -------------------------------------------------------------------------
  step_15:
    member: "leader"
    task: "Train 6 classification models with fixed hyperparameters"
    description: "Decision Tree, Naive Bayes, KNN, Logistic Regression, Random Forest, XGBoost"
    input: "data/processed/model_input.csv"
    output: "models/saved/"
    
  step_16:
    member: "leader"
    task: "Evaluate models and select best"
    description: "Compare metrics (F1, ROC-AUC), generate reports"
    output: "models/best_model.pkl"

# =============================================================================
# MODEL TRAINING CONFIGURATION (Leader)
# =============================================================================
# 6 Models to train and evaluate
# =============================================================================
model_training:
  # Input from pre-processed data
  input:
    processed_data: "data/processed/model_input.csv"
    target_column: "anomaly_label"
    
  # Models to evaluate (6 total)
  models:
    # 1. Decision Tree
    - name: "Decision Tree"
      type: "tree"
      params:
        criterion: "gini"
        max_depth: 10
        min_samples_split: 5
        min_samples_leaf: 2
        class_weight: "balanced"
        random_state: 42
        ccp_alpha: 0.0
        splitter: "best"
        min_weight_fraction_leaf: 0.0
        max_features: "sqrt"

    # 2. Naive Bayes
    - name: "Naive Bayes"
      type: "probabilistic"
      params:
        variant: "GaussianNB"
        var_smoothing: 1e-09
      # Note: Requires normal distribution - ensure Yeo-Johnson transform applied
        
    # 3. K-Nearest Neighbors (KNN)
    - name: "K-Nearest Neighbors"
      type: "distance-based"
      params:
        n_neighbors: 5
        weights: "distance"
        metric: "minkowski"
        p: 2
        leaf_size: 30
        algorithm: "auto"
        n_jobs: -1

    # 4. Logistic Regression
    - name: "Logistic Regression"
      type: "linear"
      params:
        C: 1.0
        solver: "lbfgs"
        max_iter: 5000
        class_weight: "balanced"
        random_state: 42
        tol: 1e-4
        dual: false

    # 5. Random Forest
    - name: "Random Forest"
      type: "ensemble"
      params:
        n_estimators: 100
        max_depth: 10
        min_samples_split: 5
        min_samples_leaf: 2
        class_weight: "balanced"
        random_state: 42
        bootstrap: true
        max_features: "sqrt"

    # 6. XGBoost
    - name: "XGBoost"
      type: "gradient_boosting"
      params:
        n_estimators: 100
        max_depth: 6
        learning_rate: 0.1
        subsample: 0.8
        colsample_bytree: 0.8
        scale_pos_weight: 3  # Adjust for imbalance
        random_state: 42
        eval_metric: "logloss"

  # Training configuration
  training:
    method: "train_test_split"
    stratified: true
    test_size: 0.2
    random_state: 42
    
  # Evaluation metrics
  evaluation_metrics:
    - "accuracy"
    - "precision"
    - "recall"
    - "f1_score"
    - "roc_auc"
    - "confusion_matrix"
    
  # Model selection criteria
  selection_criteria:
    primary_metric: "f1_score"
    secondary_metric: "roc_auc"
    reason: "Class imbalance (skewness=0.77) - accuracy alone is misleading"
    
  # Comparison table columns
  comparison_columns:
    - "model_name"
    - "accuracy"
    - "precision"
    - "recall"
    - "f1_score"
    - "roc_auc"
    - "training_time_seconds"
    - "params"

# =============================================================================
# OUTPUT FILES
# =============================================================================
# Intermediate files between pipeline steps
# =============================================================================
output:
  # Member 1 - Numeric Processing (Steps 1-6)
  member_1:
    validated: "data/raw/validated.csv"
    group_a_processed: "data/intermediate/group_a_processed.csv"
    # Features: eccentricity, lobularity_score, chromatin_density, nucleus_area_pct, circularity
    group_b_processed: "data/intermediate/group_b_processed.csv"
    # Features: cell_diameter_um, cell_area_px, perimeter_px, cytoplasm_ratio, membrane_smoothness, granularity_score
    group_c_processed: "data/intermediate/group_c_processed.csv"
    # Features: wbc_count_per_ul, rbc_count_millions_per_ul, hemoglobin_g_dl, hematocrit_pct, platelet_count_per_ul, mcv_fl, mchc_g_dl, mean_r, mean_g, mean_b, stain_intensity
    group_d_processed: "data/intermediate/group_d_processed.csv"
    # Features: labeller_confidence_score, cytodiffusion_classification_confidence, cytodiffusion_anomaly_score (dropped)
    numeric_processed: "data/intermediate/numeric_processed.csv"
    
  # Member 2 - Categorical & Feature Engineering (Steps 7-10)
  member_2:
    categorical_encoded: "data/intermediate/categorical_encoded.csv"
    feature_engineered: "data/intermediate/feature_engineered.csv"
    # New features: nc_ratio, form_factor, chromaticity (r_ratio, g_ratio, b_ratio), size_anomaly
    clustering_added: "data/intermediate/clustering_added.csv"
    # New feature: cell_subpopulation
    augmented: "data/intermediate/augmented.csv"
    
  # Member 3 - Feature Selection & Validation (Steps 11-14)
  member_3:
    feature_reduced: "data/intermediate/feature_reduced.csv"
    feature_selected: "data/intermediate/feature_selected.csv"
    imbalance_handled: "data/intermediate/imbalance_handled.csv"
    model_input: "data/processed/model_input.csv"
    validation_report: "reports/validation_report.md"
    
  # Leader - Model Training & Evaluation (Steps 15-16)
  leader:
    saved_models: "models/saved/"
    best_model: "models/best_model.pkl"
    model_metrics: "models/metrics.json"
    training_report: "reports/training_report.md"
    evaluation_report: "reports/evaluation_report.md"
    model_comparison_summary: "reports/model_comparison_summary.json"
    confusion_matrix_pattern: "reports/{model_name}_confusion_matrix.png"
    roc_curve_pattern: "reports/{model_name}_roc_curve.png"
    shap_summary_pattern: "reports/{model_name}_shap_summary.png"
    permutation_importance_pattern: "reports/{model_name}_permutation_importance.png"
    feature_importance: "reports/feature_importance.png"
   